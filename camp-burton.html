<div id="bouncing-heart">
    <img src="images/chromeheart.png" alt="Chrome Heart" id="heart-img">
</div>

<script>
(function () {
    var el  = document.getElementById('bouncing-heart');
    var img = document.getElementById('heart-img');
    var speed = 2.5;
    var angle = (Math.random() * 60 + 15) * (Math.PI / 180);
    var dx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
    var dy = Math.sin(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
    var x = Math.random() * (window.innerWidth - 300);
    var y = Math.random() * (window.innerHeight - 300);
    var rotation = 0;
    var spinning = false;

    el.style.left = x + 'px';
    el.style.top  = y + 'px';

    el.addEventListener('click', function () {
        if (spinning) return;
        spinning = true;
        rotation += 360;
        img.style.transition = 'transform 0.5s ease';
        img.style.transform = 'rotate(' + rotation + 'deg)';
        setTimeout(function () { spinning = false; }, 520);
    });

    function bounce() {
        var iw = el.offsetWidth;
        var ih = el.offsetHeight;
        var vw = window.innerWidth;
        var vh = window.innerHeight;

        x += dx;
        y += dy;

        if (x <= 0)        { x = 0;       dx =  Math.abs(dx); }
        if (x + iw >= vw)  { x = vw - iw; dx = -Math.abs(dx); }
        if (y <= 0)        { y = 0;       dy =  Math.abs(dy); }
        if (y + ih >= vh)  { y = vh - ih; dy = -Math.abs(dy); }

        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        requestAnimationFrame(bounce);
    }

    if (img.complete) {
        bounce();
    } else {
        img.addEventListener('load', bounce);
    }
})();
</script>
